resources:
  jobs:
    Test_Job:
      name: Test Job
      tasks:
        - task_key: Test_Task
          spark_python_task:
            python_file: Abh_test.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
            source: GIT
          environment_key: Default
      git_source:
        git_url: https://github.com/abhishek0804/databricks_github
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
