name: Deploy Databricks Bundle

on:
  push:
    branches:
      - dev
      - stage

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Set deployment target
        id: target
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "TARGET=dev" >> $GITHUB_ENV
            echo "HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
            echo "TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "stage" ]; then
            echo "TARGET=stage" >> $GITHUB_ENV
            echo "HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
            echo "TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Validate bundle
        run: databricks bundle validate -t $TARGET
        env:
          DATABRICKS_HOST: ${{ env.HOST }}
          DATABRICKS_TOKEN: ${{ env.TOKEN }}

      - name: Deploy bundle
        run: databricks bundle deploy -t $TARGET
        env:
          DATABRICKS_HOST: ${{ env.HOST }}
          DATABRICKS_TOKEN: ${{ env.TOKEN }}
